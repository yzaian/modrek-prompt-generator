<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODREK — AI Image Prompt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ─────────── TOKENS ─────────── */
:root{
  --green:   #24FF91;
  --purple:  #7C3FFE;
  --bg:      #0d0b18;
  --s1:      #161424;  /* card surface */
  --s2:      #1d1a2e;  /* input inner  */
  --s3:      #252240;  /* hover        */
  --b1:      rgba(255,255,255,0.07);   /* subtle border  */
  --b2:      rgba(255,255,255,0.12);   /* normal border  */
  --b3:      rgba(255,255,255,0.18);   /* strong border  */
  --t1:      #ece9e4;  /* primary text */
  --t2:      rgba(236,233,228,0.55);   /* secondary text */
  --t3:      rgba(236,233,228,0.32);   /* placeholder    */
  --r:       12px;     /* base radius  */
  --r2:      8px;
  --nav-h:   56px;
}

/* ─────────── BASE ─────────── */
html{ scroll-behavior:smooth }
body{
  background:var(--bg);
  color:var(--t1);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body.ltr{
  font-family:'IBM Plex Sans',sans-serif;
  direction:ltr;
}

/* dot grid */
body::after{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(36,255,145,0.055) 1px,transparent 1px);
  background-size:26px 26px;
}

/* ─────────── NAV ─────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:var(--nav-h);
  display:flex;flex-direction:row;align-items:center;
  justify-content:space-between;
  direction:ltr;
  padding:0 clamp(1rem,4vw,2.5rem);
  background:rgba(13,11,24,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
}
.nav-logo{
  display:flex;align-items:center;
  flex-shrink:0;
  order:0;
}
.nav-logo img{
  height:32px;width:auto;display:block;
}
.lang-pill{
  display:flex;flex-direction:row;order:1;flex-shrink:0;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--b2);
  border-radius:20px;
  padding:3px;
  gap:2px;
  direction:ltr;
}
.lang-pill button{
  padding:5px 16px;
  border-radius:16px;
  border:none;background:transparent;
  font-family:'IBM Plex Sans',sans-serif !important;
  font-size:12px;font-weight:500;
  color:var(--t2);
  cursor:pointer;
  transition:all .15s;
  letter-spacing:.04em;
  direction:ltr;
  unicode-bidi:plaintext;
}
.lang-pill button.on{
  background:rgba(255,255,255,0.11);
  color:var(--t1);
}

/* ─────────── PAGE LAYOUT ─────────── */
.page{
  position:relative;z-index:1;
  max-width:660px;
  margin:0 auto;
  padding:calc(var(--nav-h) + 3.5rem) clamp(1rem,4vw,1.5rem) 5rem;
}

/* ─────────── HERO ─────────── */
.hero{text-align:center;margin-bottom:2.5rem}
.eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t2);margin-bottom:1.1rem;
  font-family:'IBM Plex Sans',sans-serif;
}
.eyebrow i{
  width:5px;height:5px;border-radius:50%;
  background:var(--green);display:block;font-style:normal;
}
.hero h1{
  font-size:clamp(26px,5vw,42px);
  font-weight:700;line-height:1.15;
  letter-spacing:-.02em;
  margin-bottom:.75rem;
  color:var(--t1);
}
.hero h1 b{font-weight:700;color:var(--green)}
.hero p{
  font-size:15px;color:var(--t2);
  line-height:1.65;max-width:440px;margin:0 auto;
}

/* ─────────── SECTION LABEL ─────────── */
.sec-label{
  font-size:10px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--t3);
  display:flex;align-items:center;gap:10px;
  margin-bottom:.65rem;
  font-family:'IBM Plex Sans',sans-serif;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--b1)}

/* ─────────── CHIPS (examples) ─────────── */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.chip{
  padding:5px 13px;
  background:var(--s1);
  border:1px solid var(--b2);
  border-radius:20px;
  font-size:12.5px;font-weight:400;
  color:var(--t2);
  cursor:pointer;transition:all .15s;
}
.chip:hover{border-color:rgba(36,255,145,.35);color:var(--green);background:rgba(36,255,145,.06)}

/* ─────────── INPUT CARD ─────────── */
.input-card{
  background:var(--s1);
  border:1px solid var(--b2);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:1rem;
  box-shadow:0 2px 20px rgba(0,0,0,.35);
}
.input-body{padding:1.1rem 1.1rem .9rem}
textarea{
  width:100%;
  background:transparent;border:none;outline:none;
  color:var(--t1);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px;font-weight:400;
  line-height:1.65;resize:none;min-height:76px;
}
body.ltr textarea{font-family:'IBM Plex Sans',sans-serif}
textarea::placeholder{color:var(--t3)}

.input-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.65rem 1.1rem;
  border-top:1px solid var(--b1);
  background:rgba(255,255,255,.025);
  gap:.75rem;
}
.char-ct{
  font-size:11px;color:var(--t3);
  font-family:'IBM Plex Sans',sans-serif;
  white-space:nowrap;
}
.btn-gen{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 18px;
  background:var(--green);
  color:#0d0b18;
  border:none;border-radius:var(--r2);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;
  white-space:nowrap;flex-shrink:0;
}
body.ltr .btn-gen{font-family:'IBM Plex Sans',sans-serif}
.btn-gen::before{
  content:'';
  width:6px;height:6px;border-radius:50%;
  background:#0d0b18;flex-shrink:0;
}
.btn-gen:hover{background:#1de880;transform:translateY(-1px)}
.btn-gen:active{transform:none}
.btn-gen:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* ─────────── OPTIONS ─────────── */
.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.85rem}
@media(max-width:520px){.opts{grid-template-columns:1fr 1fr}}
.opt-group label{
  display:block;
  font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--t3);margin-bottom:.4rem;
  font-family:'IBM Plex Sans',sans-serif;
}
select{
  width:100%;
  background:var(--s1);
  border:1px solid var(--b2);
  border-radius:var(--r2);
  color:var(--t1);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:13px;font-weight:400;
  padding:8px 10px;
  outline:none;-webkit-appearance:none;cursor:pointer;
  transition:border-color .15s;
}
body.ltr select{font-family:'IBM Plex Sans',sans-serif}
select:focus{border-color:rgba(36,255,145,.4)}
select option{background:#1d1a2e}

/* ─────────── COLOR INTENSITY ─────────── */
.intensity{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1.75rem}
.int-btn{
  padding:9px 8px;
  background:var(--s1);
  border:1px solid var(--b2);
  border-radius:var(--r2);
  color:var(--t2);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:12px;font-weight:500;
  cursor:pointer;text-align:center;transition:all .15s;
  line-height:1.3;
}
body.ltr .int-btn{font-family:'IBM Plex Sans',sans-serif}
.int-btn small{display:block;font-size:10px;font-weight:300;color:var(--t3);margin-top:3px}
.int-btn:hover{border-color:rgba(36,255,145,.25);color:var(--t1)}
.int-btn.on{background:rgba(36,255,145,.08);border-color:rgba(36,255,145,.4);color:var(--green)}
.int-btn.on small{color:rgba(36,255,145,.55)}

/* ─────────── LOADING ─────────── */
.loading{
  display:none;
  background:var(--s1);border:1px solid var(--b2);
  border-radius:var(--r);
  padding:2.5rem;text-align:center;
  margin-top:1.25rem;
}
.loading.on{display:block}
.spin{
  width:28px;height:28px;
  border:2px solid var(--b2);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .75s linear infinite;
  margin:0 auto .9rem;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:4px}
.load-step{font-size:12px;color:var(--green);font-weight:400;font-family:'IBM Plex Sans',sans-serif}

/* ─────────── ERROR ─────────── */
.err{
  display:none;
  background:rgba(220,80,80,.07);
  border:1px solid rgba(220,80,80,.2);
  border-radius:var(--r2);
  padding:.9rem 1.1rem;
  font-size:13px;color:rgba(255,120,120,.85);
  margin-top:1rem;
  font-family:'IBM Plex Sans',sans-serif;
}
.err.on{display:block}

/* ─────────── OUTPUT ─────────── */
.output{
  display:none;flex-direction:column;gap:1.1rem;
  margin-top:1.5rem;
  animation:up .35s ease both;
}
.output.on{display:flex}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* tags row */
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:500;font-family:'IBM Plex Sans',sans-serif}
.tag-g{background:rgba(36,255,145,.09);border:1px solid rgba(36,255,145,.22);color:var(--green)}
.tag-p{background:rgba(124,63,254,.1);border:1px solid rgba(124,63,254,.28);color:#b48fff}
.tag-n{background:var(--s1);border:1px solid var(--b2);color:var(--t2)}

/* main prompt card */
.prompt-card{
  background:#0d0b18;
  border:1px solid var(--b2);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:0 4px 28px rgba(0,0,0,.45);
}
.prompt-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1.1rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);
  gap:.75rem;
}
.prompt-platform{
  display:flex;align-items:center;gap:7px;
  font-size:10px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.35);
  font-family:'IBM Plex Sans',sans-serif;
  flex:1;min-width:0;
}
.prompt-platform::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:var(--green);flex-shrink:0;
}
.copy-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 13px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:6px;
  color:rgba(255,255,255,.55);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:11px;font-weight:500;
  cursor:pointer;transition:all .15s;
  white-space:nowrap;flex-shrink:0;
}
.copy-btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.copy-btn.done{border-color:var(--green);color:var(--green);background:rgba(36,255,145,.07)}

.prompt-body{
  padding:1.1rem;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:13px;font-weight:300;
  line-height:1.8;color:rgba(255,255,255,.82);
  white-space:pre-wrap;word-break:break-word;
}

/* specs */
.specs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:440px){.specs{grid-template-columns:1fr 1fr}}
.spec{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:var(--r2);padding:.7rem .9rem;
}
.spec-l{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;font-family:'IBM Plex Sans',sans-serif}
.spec-v{font-size:12.5px;font-weight:500;color:var(--green)}

/* neg prompt */
.neg-card{
  background:rgba(200,60,60,.05);
  border:1px solid rgba(200,60,60,.18);
  border-radius:var(--r);overflow:hidden;
}
.neg-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1.1rem;
  border-bottom:1px solid rgba(200,60,60,.12);
  background:rgba(200,60,60,.04);
  gap:.75rem;
}
.neg-label{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,110,110,.7);
  font-family:'IBM Plex Sans',sans-serif;
}
.neg-label::before{content:'';width:6px;height:6px;border-radius:50%;background:rgba(220,80,80,.65)}
.neg-body{
  padding:1rem 1.1rem;
  font-family:'IBM Plex Sans',sans-serif;
  font-size:12.5px;font-weight:300;
  color:rgba(255,120,120,.7);
  line-height:1.75;
  white-space:pre-wrap;word-break:break-word;
}
.neg-copy{
  background:none;
  border:1px solid rgba(200,60,60,.2);
  border-radius:5px;
  color:rgba(255,110,110,.6);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:11px;font-weight:500;
  padding:4px 10px;cursor:pointer;transition:all .15s;
  white-space:nowrap;flex-shrink:0;
}
.neg-copy:hover{background:rgba(200,60,60,.1);color:rgba(255,130,130,.9)}
.neg-copy.done{border-color:var(--green);color:var(--green)}

/* regen */
.regen{
  width:100%;padding:11px;
  background:transparent;
  border:1px solid var(--b2);
  border-radius:var(--r2);
  color:var(--t2);
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:14px;font-weight:400;
  cursor:pointer;transition:all .15s;
}
body.ltr .regen{font-family:'IBM Plex Sans',sans-serif}
.regen:hover{border-color:rgba(36,255,145,.35);color:var(--green)}

/* footer */
footer{
  position:relative;z-index:1;
  text-align:center;padding:2rem 1rem;
  border-top:1px solid var(--b1);
  font-size:11.5px;color:var(--t3);
  font-family:'IBM Plex Sans',sans-serif;
}
footer svg{height:14px;display:inline-block;vertical-align:middle;margin-inline-end:6px}
footer svg path,footer svg polygon{fill:var(--t3)}

/* ─────────── RESPONSIVE ─────────── */
@media(max-width:480px){
  .hero h1{font-size:24px}
  .hero p{font-size:14px}
  .intensity{grid-template-columns:1fr 1fr}
  .opts{grid-template-columns:1fr 1fr}
  .prompt-body{font-size:12px}
  .specs{grid-template-columns:1fr 1fr}
}
</style>
</head>

    lPrompt:    'Universal Prompt',
    lSpecs:     'Technical specs',
    lNeg:       'Negative Prompt',
    genIdle:    'Write your idea first',
    genReady:   'Generate Prompt ✦',
    genLoading: 'Generating...',
    regen:      '↺  Regenerate',
    loadMsg:    'Building your prompt...',
    platform:   'Ready for ChatGPT · ImageFX · Flux · Midjourney',
    footer:     'MODREK Image Prompt Engine',
    examples: [
      { label:'📱 Mobile investing',   text:'A young man checking an investment app on his phone' },
      { label:'🤝 Team meeting',       text:'A businessman in a team meeting in a modern office' },
      { label:'💻 Working in a café',  text:'A young woman working on a laptop in a café' },
      { label:'🎯 Celebrating success',text:'A person celebrating a financial milestone' },
      { label:'👥 Team discussion',    text:'A team discussing an investment plan around a conference table' },
    ],
    chars:[
      { v:'male',   t:'Man — thobe + shemagh' },
      { v:'female', t:'Woman — black abaya' },
      { v:'group',  t:'Mixed group' },
      { v:'none',   t:'No person' },
    ],
    locs:[
      { v:'office',  t:'Modern office' },
      { v:'outdoor', t:'Outdoor — Riyadh' },
      { v:'cafe',    t:'Café' },
      { v:'home',    t:'Home / home office' },
      { v:'auto',    t:'Based on idea' },
    ],
    ratios:[
      { v:'4:5',  t:'4:5 — Instagram' },
      { v:'1:1',  t:'1:1 — Square' },
      { v:'9:16', t:'9:16 — Story' },
      { v:'16:9', t:'16:9 — Banner' },
    ],
    intensity:[
      { v:'subtle',  t:'Very subtle',  s:'screen glow only' },
      { v:'natural', t:'Natural ✦',    s:'ambient + reflections' },
      { v:'present', t:'Present',      s:'lighting & environment' },
    ],
    loadSteps:['Analyzing idea...','Applying MODREK identity...','Setting lighting & colors...','Building prompt...','Final review...'],
  }
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let lang = 'ar';
let intensity = 'natural';

// ═══════════════════════════════════════════
// RENDER UI
// ═══════════════════════════════════════════
function render() {
  const t = T[lang];
  const body = document.getElementById('B');
  const html = document.documentElement;

  body.className = lang === 'en' ? 'ltr' : '';
  html.setAttribute('lang', lang);
  html.setAttribute('dir', lang === 'en' ? 'ltr' : 'rtl');

  document.getElementById('btnAr').className = lang === 'ar' ? 'on' : '';
  document.getElementById('btnEn').className = lang === 'en' ? 'on' : '';

  // hero
  document.getElementById('eyebrowTxt').textContent = t.eyebrow;
  const lines = t.h1.split('\n');
  document.getElementById('heroH1').innerHTML =
    lines[0] + (lines[1] ? '<br><b>' + lines[1] + '</b>' : '');
  document.getElementById('heroP').innerHTML = t.p.replace('\n','<br>');

  // labels
  document.getElementById('exLabel').textContent  = t.exLabel;
  document.getElementById('lChar').textContent    = t.lChar;
  document.getElementById('lLoc').textContent     = t.lLoc;
  document.getElementById('lRatio').textContent   = t.lRatio;
  document.getElementById('lColor').textContent   = t.lColor;
  document.getElementById('lElements').textContent = t.lElements;
  document.getElementById('lPrompt').textContent  = t.lPrompt;
  document.getElementById('lSpecs').textContent   = t.lSpecs;
  document.getElementById('lNeg').textContent     = t.lNeg;
  document.getElementById('platformLabel').textContent = t.platform;
  document.getElementById('regenBtn').textContent = t.regen;
  document.getElementById('footerTxt').textContent = t.footer;
  document.getElementById('loadMsg').textContent  = t.loadMsg;

  // placeholder & btn
  const idea = document.getElementById('idea');
  idea.placeholder = t.examples[0].text + '...';
  const ok = idea.value.trim().length > 0;
  document.getElementById('genLabel').textContent = ok ? t.genReady : t.genIdle;

  // examples chips
  const row = document.getElementById('chipsRow');
  row.innerHTML = '';
  t.examples.forEach(e => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = e.label;
    b.onclick = () => { idea.value = e.text; onInput(); };
    row.appendChild(b);
  });

  // selects
  fillSelect('selChar',  t.chars);
  fillSelect('selLoc',   t.locs);
  fillSelect('selRatio', t.ratios);

  // intensity
  const irow = document.getElementById('intRow');
  irow.innerHTML = '';
  t.intensity.forEach(item => {
    const b = document.createElement('button');
    b.className = 'int-btn' + (item.v === intensity ? ' on' : '');
    b.innerHTML = item.t + '<small>' + item.s + '</small>';
    b.onclick = () => { intensity = item.v; render(); };
    irow.appendChild(b);
  });
}

function fillSelect(id, items) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '';
  items.forEach(item => {
    const o = document.createElement('option');
    o.value = item.v; o.textContent = item.t;
    if (item.v === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function setLang(l) { lang = l; render(); }

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
function onInput() {
  const idea = document.getElementById('idea');
  const len  = idea.value.length;
  document.getElementById('charCt').textContent = len + ' / 300';
  const ok = idea.value.trim().length > 0;
  document.getElementById('genBtn').disabled = !ok;
  document.getElementById('genLabel').textContent = ok ? T[lang].genReady : T[lang].genIdle;
}

document.getElementById('idea').addEventListener('input', onInput);
document.getElementById('genBtn').addEventListener('click', generate);

// ═══════════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════════
const CHAR_MAP = {
  male:   'a young Saudi professional man wearing a crisp white thobe, red-and-white checkered shemagh headscarf, and black agal — attire must be pristine and authentic',
  female: 'a young Saudi professional woman wearing an elegant full-length black abaya with a matching black hijab — modest and professional',
  group:  'a group of Saudi professionals: men in white thobes with red shemagh and black agal, women in black abayas and hijabs',
  none:   'no people — focus on environment, objects, and atmosphere'
};
const LOC_MAP = {
  office:  'a sleek modern Saudi corporate office with floor-to-ceiling glass walls, minimalist furniture, Riyadh skyline visible through large windows',
  outdoor: 'a modern Saudi urban plaza in Riyadh with contemporary architecture and natural daylight',
  cafe:    'an upscale contemporary Saudi coffee shop with warm lighting and modern Arabic-inspired interior',
  home:    'a clean modern home office in Saudi Arabia with a minimalist desk and warm natural window light',
  auto:    'an appropriate modern Saudi professional setting that fits the scene naturally'
};
const COL_MAP = {
  subtle:  'MODREK brand colors barely present: only a faint green (#24FF91) tint from a phone or laptop screen — barely perceptible, scene feels completely natural',
  natural: 'MODREK colors integrated naturally: soft green (#24FF91) ambient glow from laptop or phone screens showing data charts; gentle purple (#7C3FFE) color cast in cool background shadows — looks like premium studio photography',
  present: 'MODREK colors visibly present: green (#24FF91) light from tech screens creating color accents on surfaces; purple (#7C3FFE) in background shadow tones — cinematic fintech campaign aesthetic, still photorealistic'
};

async function generate() {
  const idea = document.getElementById('idea').value.trim();
  if (!idea) return;

  const t      = T[lang];
  const char   = CHAR_MAP[document.getElementById('selChar').value];
  const loc    = LOC_MAP[document.getElementById('selLoc').value];
  const color  = COL_MAP[intensity];
  const ratio  = document.getElementById('selRatio').value;

  // show loading
  document.getElementById('loadWrap').classList.add('on');
  document.getElementById('errWrap').classList.remove('on');
  document.getElementById('outWrap').classList.remove('on');
  document.getElementById('genBtn').disabled = true;
  document.getElementById('genLabel').textContent = t.genLoading;

  let si = 0;
  const iv = setInterval(() => {
    document.getElementById('loadStep').textContent = t.loadSteps[Math.min(si++, t.loadSteps.length - 1)];
  }, 900);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        system: `You are a world-class AI image prompt engineer for MODREK, a Saudi fintech investment platform.

Brand: modern, clean, forward-thinking, trustworthy. Colors: green #24FF91 (primary), purple #7C3FFE (secondary), navy #151323.
Photography style: cinematic photorealism — premium Saudi corporate campaign photography. Natural light, shallow DOF, authentic expressions. NOT AI-generated looking.

Saudi dress code — ALWAYS strictly applied:
- Men: white thobe + red-and-white shemagh + black agal
- Women: full black abaya + black hijab

Output ONE universal prompt that works across ChatGPT/DALL-E 3, Google ImageFX, Flux, and Midjourney.

Respond ONLY with valid JSON, no markdown, no backticks:
{"elements":["tag1","tag2","tag3","tag4","tag5"],"universal_prompt":"string","negative_prompt":"string","specs":{"lighting":"string","color_mood":"string","composition":"string"}}`,
        messages: [{ role: 'user', content:
          `Scene: "${idea}"
Character: ${char}
Setting: ${loc}
Color integration: ${color}
Aspect ratio: ${ratio}

Write a rich, flowing paragraph prompt. Include: exact Saudi dress, action/emotion, environment details, MODREK color integration as specified, cinematic photorealism, 85mm lens, shallow DOF, natural window light, soft bokeh, clear upper space for text overlay, 8K RAW photo quality, professional commercial photography, --ar ${ratio.replace(':','/')}.` }]
      })
    });

    clearInterval(iv);
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    const raw = data.content.map(c => c.text || '').join('');
    const result = JSON.parse(raw.replace(/```json|```/g, '').trim());
    showResult(result);

  } catch(err) {
    clearInterval(iv);
    document.getElementById('loadWrap').classList.remove('on');
    document.getElementById('genBtn').disabled = false;
    document.getElementById('genLabel').textContent = T[lang].genReady;
    document.getElementById('errWrap').textContent = err.message;
    document.getElementById('errWrap').classList.add('on');
  }
}

function showResult(r) {
  document.getElementById('loadWrap').classList.remove('on');
  document.getElementById('genBtn').disabled = false;
  document.getElementById('genLabel').textContent = T[lang].genReady;
  document.getElementById('outWrap').classList.add('on');

  // tags
  const tagCls = ['tag-g','tag-p','tag-n','tag-g','tag-p'];
  document.getElementById('tagsRow').innerHTML = (r.elements || [])
    .map((e,i) => `<span class="tag ${tagCls[i%3]}">${e}</span>`).join('');

  // prompts
  document.getElementById('mainPrompt').textContent = r.universal_prompt || '';
  document.getElementById('negPrompt').textContent  = r.negative_prompt  || '';

  // specs
  const sd = [
    { l:'Lighting',    v: r.specs?.lighting    || '—' },
    { l:'Color Mood',  v: r.specs?.color_mood  || '—' },
    { l:'Composition', v: r.specs?.composition || '—' },
  ];
  document.getElementById('specsRow').innerHTML = sd.map(s =>
    `<div class="spec"><div class="spec-l">${s.l}</div><div class="spec-v">${s.v}</div></div>`
  ).join('');

  setTimeout(() => document.getElementById('outWrap').scrollIntoView({ behavior:'smooth', block:'start' }), 120);
}

// regen
document.getElementById('regenBtn').addEventListener('click', generate);

// copy buttons
document.getElementById('copyMain').addEventListener('click', function() {
  navigator.clipboard.writeText(document.getElementById('mainPrompt').textContent).then(() => {
    this.textContent = '✓ Copied'; this.classList.add('done');
    setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('done'); }, 2000);
  });
});
document.getElementById('copyNeg').addEventListener('click', function() {
  navigator.clipboard.writeText(document.getElementById('negPrompt').textContent).then(() => {
    this.textContent = '✓ Copied'; this.classList.add('done');
    setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('done'); }, 2000);
  });
});

// ─── INIT ───
render();
